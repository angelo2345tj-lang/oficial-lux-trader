<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07090E" />
  <title>Lux Trader FX — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07090E;
      color: #fff;
      font-family: Inter, system-ui, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .card {
      text-align: center;
      max-width: 360px;
      padding: 2.5rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,12,18,0.9);
    }
    h1 { font-size: 1.25rem; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.75rem; }
    p { font-size: 0.8rem; color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.85rem 1.5rem;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 1rem;
      font-weight: 800;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lux Trader FX</h1>
    <p>Você está offline. Os dados em cache continuam disponíveis quando a conexão voltar.</p>
    <a href="/">Tentar novamente</a>
  </div>
</body>
</html>
