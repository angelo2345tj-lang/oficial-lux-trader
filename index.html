
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lux Trader FX - A IA dos Traders</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#07090E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lux Trader FX" />
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07090E;
            --bg-secondary: #0a0a0c;
            --bg-card: rgba(10, 10, 15, 0.8);
            --bg-input: rgba(0, 0, 0, 0.85);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-main: rgba(255, 255, 255, 0.05);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --glass: rgba(5, 5, 8, 0.8);
            --shadow-color: rgba(0, 0, 0, 0.9);
            --star-color: #ffffff;
        }

        .light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-input: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-main: rgba(0, 0, 0, 0.1);
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --glass: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.05);
            --star-color: #3b82f6;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.3s ease;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            margin: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: auto;
            letter-spacing: -0.015em;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-main); border-radius: 10px; }

        .glass-morphism {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border-main);
            box-shadow: 0 10px 40px 0 var(--shadow-color);
        }

        .mono { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

        /* --- BACKGROUND PREMIUM --- */
        .stars-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0e18 0%, #07090E 100%);
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 1;
        }

        .nebula-blue {
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, #1e40af, transparent);
            top: -20%;
            left: -10%;
            animation: drift 25s infinite alternate ease-in-out;
        }

        .nebula-purple {
            width: 70vw;
            height: 70vh;
            background: radial-gradient(circle, #581c87, transparent);
            bottom: -15%;
            right: -10%;
            animation: drift 30s infinite alternate-reverse ease-in-out;
        }

        .nebula-cyan {
            width: 60vw;
            height: 60vh;
            background: radial-gradient(circle, #0e7490, transparent);
            top: 20%;
            right: 15%;
            animation: drift 20s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.5;
        }

        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            z-index: 3;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .stardust-layer {
            position: absolute;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            z-index: 4;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 2px;
            z-index: 1000;
            background: rgba(59, 130, 246, 0.15);
            opacity: 0.5;
            position: absolute;
            top: 0;
            animation: scan 8s linear infinite;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }
        .animate-pulse-soft { animation: pulse-soft 4s infinite ease-in-out; }

        @keyframes fade-slide-up {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animate-view-entry { animation: fade-slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .text-glow {
            text-shadow: 0 0 15px var(--accent-glow);
        }

        input::placeholder { color: var(--text-muted); opacity: 0.5; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
