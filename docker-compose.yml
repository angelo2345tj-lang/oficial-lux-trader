services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lux
      POSTGRES_PASSWORD: lux_secret
      POSTGRES_DB: lux_trader
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://lux:lux_secret@postgres:5432/lux_trader
      REDIS_URL: redis://redis:6379
      EXECUTION_ENABLED: 'false'
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - '3000:80'
    depends_on:
      - api

volumes:
  pgdata:
